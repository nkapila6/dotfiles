# includes
include quick-access-terminal.conf
globinclude kitty.d/**/*.conf

# font
font_family family="Rec Mono Casual"
# font_family family="JetBrainsMono Nerd Font"
# font_family family="Iosevka"
bold_font        auto
italic_font      auto
bold_italic_font auto

# font size
font_size 16.0
enable_audio_bell yes

# notif
hide_window_decorations titlebar-only
# window_padding_width 25
windows_alert_on_bell yes
draw_minimal_borders yes
active_border_color none
active_tab_font_style bold

#copy on select
copy_on_select clipboard

# This setting explicitly allows programs (like Neovim) to send data to the host clipboard.
# clipboard_control write-clipboard,write-primary
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# BEGIN_KITTY_THEME
# Monokai Soda
include current-theme.conf
# END_KITTY_THEME

# background
background_opacity 0.95
background_blur 20
allow_hyperlinks yes
editor nvim

# tab bar
tab_bar_edge bottom
tab_bar_align left
tab_bar_style custom
tab_separator ""
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_title_template "{f'{title[:30]}…' if title.rindex(title[-1]) + 1 > 30 else (title.center(6) if (title.rindex(title[-1]) + 1) % 2 == 0 else title.center(5))}"
tab_activity_symbol none
tab_separator ""
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_title_template "{f'{title[:30]}…' if title.rindex(title[-1]) + 1 > 30 else (title.center(6) if (title.rindex(title[-1]) + 1) % 2 == 0 else title.center(5))}"
active_tab_font_style   bold


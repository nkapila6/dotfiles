add_newline = true


format = """
$directory$git_branch$git_status$python$fill$cmd_duration $time$line_break\
$character"""

[cmd_duration]
min_time = 0  # Show if command takes 2 seconds or more (in milliseconds)
style = "bold orange"
show_milliseconds = false

[fill]
symbol=" "
# style="bold white"

[aws]
disabled = true

[battery]
disabled = true

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"
vicmd_symbol = "[](bold green)"

[conda]

[directory]
truncation_length = 0
truncate_to_repo=false

[dotnet]
disabled = true

[env_var]
disabled = true

[elixir]
symbol = " "

[elm]
symbol = " "

[git_branch]
symbol = " "

[git_commit]
disabled = false
commit_hash_length = 4

[git_state]
disabled = true

[git_status]
conflicted = "=${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[gcloud]
disabled = true

[golang]
symbol = " "

[hostname]

[jobs]

[kubernetes]
symbol = " "
disabled = false

[line_break]
disabled = false

[lua]
symbol = " "
lua_binary = "luajit"

[nix_shell]
disabled = true

[memory_usage]
disabled = true

[java]
symbol = " "

[julia]

[nim]

[nodejs]
symbol = " "

[package]
symbol = " "

[php]
symbol = " "

[python]
symbol = " "

[ruby]
symbol = " "

[rust]
symbol = " "

[scala]
symbol = " "

[terraform]
symbol = " "
format = "via [$symbol$version]($style)"

[time]
disabled = false
time_format = "%a | %R"
style="bold yellow"
# format = "[[](fg:yellow)[$time](bg:yellow fg:black)[](fg:yellow)]($style)"

[username]
disabled = false
